name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VITE_BASE: /${{ github.event.repository.name }}/

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_WORKFLOW_TOKEN: ${{ secrets.VITE_WORKFLOW_TOKEN }}
          VITE_WORKFLOW_SECRET: ${{ secrets.VITE_WORKFLOW_SECRET }}
          VITE_JOURNEY_TOKEN: ${{ secrets.VITE_JOURNEY_TOKEN }}
          VITE_ALLOY_SDK: ${{ secrets.VITE_ALLOY_SDK }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
